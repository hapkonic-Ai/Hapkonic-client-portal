services:
  - type: web
    name: hapkonic-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hapkonic-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://hapkonic-portal.vercel.app
      - key: REDIS_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: UPLOADTHING_SECRET
        sync: false

databases:
  - name: hapkonic-db
    databaseName: hapkonic
    plan: free
